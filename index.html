<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Shrouk with Love ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', Roboto, sans-serif;
    user-select: none;
  }

  /* حاوية الاسم */
  .container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }

  .name {
    font-size: clamp(45px, 12vw, 100px);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 8px;
    text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff0000;
    margin-bottom: 10px;
    animation: floating 3s ease-in-out infinite;
  }

  .sub-text {
    font-size: 22px;
    color: #ffb3c1;
    min-height: 30px;
    text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
  }

  @keyframes floating {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  /* زرار الموسيقى بشكل "قلب" صغير */
  #music-toggle {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: rgba(255, 77, 109, 0.2);
    border: 2px solid #ff4d6d;
    border-radius: 50%;
    color: #ff4d6d;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 200;
  }

  #music-toggle:hover {
    background: #ff4d6d;
    color: white;
    box-shadow: 0 0 20px #ff4d6d;
  }

  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="name">SHROUK</div>
  <div class="sub-text" id="changing-text"></div>
</div>

<button id="music-toggle">🎵</button>

<audio id="audio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const musicBtn = document.getElementById("music-toggle");
const audio = document.getElementById("audio");
const textEl = document.getElementById("changing-text");

let width, height;
let particles = [];
let heartPoints = [];
let sparks = []; // للشرار عند الضغط

const messages = [
  "You are my world ❤️",
  "The most beautiful girl ✨",
  "Forever yours 🌹",
  "My heart belongs to you 💖"
];
let msgIndex = 0;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

// تبديل الكلام كل 3 ثواني
function updateText() {
  textEl.innerText = messages[msgIndex];
  msgIndex = (msgIndex + 1) % messages.length;
}
setInterval(updateText, 3000);
updateText();

// تشغيل الصوت
musicBtn.onclick = () => {
  if(audio.paused) { audio.play(); musicBtn.innerText = "❤️"; }
  else { audio.pause(); musicBtn.innerText = "🎵"; }
};

// كلاس للشرار (Explosion)
class Spark {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = Math.random() * 15 + 5;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = Math.random() * 8 + 2;
    this.friction = 0.95;
    this.gravity = 0.1;
    this.opacity = 1;
    this.color = `hsl(${Math.random() * 30 + 340}, 100%, 65%)`; // درجات البينك والأحمر
  }
  update() {
    this.speed *= this.friction;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed + this.gravity;
    this.opacity -= 0.015;
  }
  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.font = `${this.size}px Arial`;
    ctx.fillText("❤️", this.x, this.y);
  }
}

// عند الضغط على الشاشة
window.addEventListener('mousedown', (e) => {
  for(let i=0; i<15; i++) {
    sparks.push(new Spark(e.clientX, e.clientY));
  }
});

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
  ctx.fillRect(0, 0, width, height);

  // 1. رسم الغبار السحري في الخلفية
  for(let i=0; i<2; i++) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(Math.random()*width, Math.random()*height, 0.5, 0, Math.PI*2);
    ctx.fill();
  }

  // 2. تحديث ورسم الانفجارات
  sparks.forEach((s, i) => {
    s.update();
    s.draw();
    if(s.opacity <= 0) sparks.splice(i, 1);
  });

  // 3. رسم القلب النبضي في المنتصف (أكبر بكتير)
  const time = Date.now() * 0.002;
  const pulse = 1 + Math.sin(time) * 0.1;
  const scale = (Math.min(width, height) / 35) * pulse;
  
  ctx.shadowBlur = 30;
  ctx.shadowColor = "#ff4d6d";
  ctx.strokeStyle = "#ff4d6d";
  ctx.lineWidth = 3;
  ctx.beginPath();
  for(let t = 0; t < Math.PI*2; t += 0.05) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    let posX = width/2 + x * scale;
    let posY = height/2 + y * scale;
    if(t === 0) ctx.moveTo(posX, posY); else ctx.lineTo(posX, posY);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;

  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);
resize();
draw();
</script>

</body>
</html>
